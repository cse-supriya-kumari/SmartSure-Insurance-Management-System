name: SmartSure CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Test each Java microservice
  # ─────────────────────────────────────────────
  build-backend:
    name: Build & Test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - admin-service
          - api-gateway
          - auth-service
          - claims-service
          - config-server
          - eureka-server
          - policy-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        # Exclude *ApplicationTests — they require live infrastructure (Redis, RabbitMQ)
        # that is not available in CI. All other unit tests run normally.
        run: mvn clean package --no-transfer-progress -Dsurefire.excludes="**/*ApplicationTests.class"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2: Build React Frontend
  # ─────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: smartsure-frontend/package-lock.json

      - name: Install dependencies
        working-directory: smartsure-frontend
        run: npm ci --legacy-peer-deps

      - name: Build React app
        working-directory: smartsure-frontend
        run: npm run build
        env:
          CI: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: smartsure-frontend/build/
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 3: Build Docker images (push on main if secrets set)
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.event_name == 'push'

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    strategy:
      fail-fast: false
      matrix:
        service:
          - admin-service
          - api-gateway
          - auth-service
          - claims-service
          - config-server
          - eureka-server
          - policy-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package JAR (skip tests — already tested above)
        working-directory: ${{ matrix.service }}
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' && env.DOCKERHUB_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/smartsure-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/smartsure-${{ matrix.service }}:${{ github.sha }}

  # ─────────────────────────────────────────────
  # JOB 4: Build Frontend Docker image (on push)
  # ─────────────────────────────────────────────
  docker-build-frontend:
    name: Docker Build (frontend)
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.event_name == 'push'

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: smartsure-frontend
          push: ${{ github.ref == 'refs/heads/main' && env.DOCKERHUB_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/smartsure-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/smartsure-frontend:${{ github.sha }}
