version: '3.8'

services:
  # Infrastructure
  mysql:
    image: mysql:8.0
    container_name: smartsure-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: smartsure
    networks:
      - smartsure-network
    volumes:
      - ./docker/mysql-init:/docker-entrypoint-initdb.d

  redis:
    image: redis:alpine
    container_name: smartsure-redis
    ports:
      - "6379:6379"
    networks:
      - smartsure-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: smartsure-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - smartsure-network

  # Microservices
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - smartsure-network

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - eureka-server
    networks:
      - smartsure-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root}
      SPRING_REDIS_HOST: redis
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-9a4f2c8d3b7a1e5f8g9h0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z7a8b9c0d1e}
    depends_on:
      - mysql
      - redis
      - eureka-server
    networks:
      - smartsure-network

  policy-service:
    build: ./policy-service
    container_name: policy-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/policy_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root}
      SPRING_REDIS_HOST: redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      AUTH_SERVICE_URL: http://auth-service:8081
      JWT_SECRET: ${JWT_SECRET:-9a4f2c8d3b7a1e5f8g9h0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z7a8b9c0d1e}
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - eureka-server
    networks:
      - smartsure-network

  claims-service:
    build: ./claims-service
    container_name: claims-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/claims_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root}
      SPRING_REDIS_HOST: redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      AUTH_SERVICE_URL: http://auth-service:8081
      POLICY_SERVICE_URL: http://policy-service:8082
      JWT_SECRET: ${JWT_SECRET:-9a4f2c8d3b7a1e5f8g9h0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z7a8b9c0d1e}
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - eureka-server
    volumes:
      - ./uploads/claims:/app/uploads/claims
    networks:
      - smartsure-network

  admin-service:
    build: ./admin-service
    container_name: admin-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/admin_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root}
      SPRING_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      AUTH_SERVICE_URL: http://auth-service:8081
      CLAIMS_SERVICE_URL: http://claims-service:8083
      POLICY_SERVICE_URL: http://policy-service:8082
      JWT_SECRET: ${JWT_SECRET:-9a4f2c8d3b7a1e5f8g9h0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z7a8b9c0d1e}
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - eureka-server
    networks:
      - smartsure-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_SERVER_HOST: eureka-server
      CONFIG_SERVER_HOST: config-server
      JWT_SECRET: ${JWT_SECRET:-9a4f2c8d3b7a1e5f8g9h0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z7a8b9c0d1e}
    depends_on:
      - eureka-server
      - config-server
    networks:
      - smartsure-network

  frontend:
    build: ./smartsure-frontend
    container_name: smartsure-frontend
    ports:
      - "3001:80"
    environment:
      REACT_APP_API_BASE_URL: http://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - smartsure-network

networks:
  smartsure-network:
    driver: bridge
