server:
  port: 8082

spring:
  application:
    name: policy-service

  cloud:
    config:
      enabled: false

  config:
    import: 
      - "optional:file:.env[.properties]"
      - "optional:file:../.env[.properties]"

  datasource:
    url: ${POLICY_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3307/policy_db}
    username: root
    password: ${DB_PASSWORD}

  cache:
    type: simple

  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: ${RABBITMQ_PASSWORD:guest}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api/policies/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.smartsure.policy: DEBUG

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50

management:
  tracing:
    enabled: false
    sampling:
      probability: 0.0
  zipkin:
    tracing:
      endpoint: http://127.0.0.1:9411/api/v2/spans
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers